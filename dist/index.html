 class="oasis-audio-dock-empty">Agrega canciones con + Fondo para controlarlas aqui.</div>';Array.from(q.querySelectorAll('[data-row]')).forEach(function(btn){btn.onclick=function(){var t=list[Number(btn.dataset.row)];if(t&&t.row){t.row.click();audioUiState.current=0;sendAudio('playVideo')}}})}      function enhance(){var title=Array.from(document.querySelectorAll('span,div')).find(function(n){return /Playlist de Fondo/i.test(n.textContent||'')&&n.getClientRects().length});if(title){var card=title.closest('div[class*="overflow-hidden"]')||title.closest('div');if(card)card.classList.add('oasis-audio-enhanced')}var yt=document.getElementById('youtube-browser-iframe');if(yt&&yt.parentElement)yt.parentElement.classList.add('oasis-youtube-frame');var action=Array.from(document.querySelectorAll('button,span')).find(function(n){return /Crear nuevo item|Unir con actual/i.test(n.textContent||'')&&n.getClientRects().length});if(action){var row=action.closest('div[class*="border"]');if(row)row.classList.add('oasis-youtube-actions')}var input=Array.from(document.querySelectorAll('input[placeholder*="Pega link"],input[placeholder*="busca"]')).find(function(n){return n.getClientRects().length});if(input)input.classList.add('oasis-youtube-input');var submit=Array.from(document.querySelectorAll('button')).find(function(n){return /BUSCAR|AGREGAR A LISTA|BUSCANDO/i.test(n.textContent||'')&&n.getClientRects().length});if(submit)submit.classList.add('oasis-youtube-submit')}
      function ensureNav(){var nav=document.getElementById('oasis-work-nav');if(!nav){nav=document.createElement('nav');nav.id='oasis-work-nav';nav.className='oasis-work-nav';nav.innerHTML='<button data-view="playlist" class="is-active">Lista</button><button data-view="preview">Vivo</button><button data-view="editor">Editor</button><button data-action="close">Cerrar</button>';nav.addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;if(b.dataset.action==='close'){document.body.classList.remove('oasis-editor-open');return}nav.querySelectorAll('button[data-view]').forEach(function(x){x.classList.toggle('is-active',x===b)});if(b.dataset.view==='editor'){document.body.classList.add('oasis-editor-open');var real=Array.from(document.querySelectorAll('button')).find(function(x){return /Editor/i.test(x.textContent||'')&&x!==b});if(real)real.click()}else{document.body.classList.remove('oasis-editor-open');var rx=new RegExp(b.dataset.view==='preview'?'Vivo':'Lista','i');var real2=Array.from(document.querySelectorAll('button')).find(function(x){return rx.test(x.textContent||'')&&x!==b});if(real2)real2.click()}});document.body.appendChild(nav)}}
      var manualLogoHooked=false;
      function hookManualSaveLogo(){
        if(manualLogoHooked)return;
        var btn=Array.from(document.querySelectorAll('button')).find(function(b){return /Guardar manual/i.test(b.textContent||'')&&b.getClientRects().length});
        if(!btn)return;
        manualLogoHooked=true;
        btn.addEventListener('click',function(){setTimeout(function(){saveLogoEverywhere(readLogoSettings())},250)},true);
      }
      setInterval(function(){ensureLogoButton();applyLogo();importLogoOnce();hookManualSaveLogo();enhance();ensureDock();ensureNav()},650);
