        if (target.dataset.action === 'next') {
          if (index === steps.length - 1) finish();
          else {
            index += 1;
            render();
          }
          return;
        }
        if (target.dataset.action === 'finish') finish();
      });

      function activateIfNeeded() {
        if (active || localStorage.getItem('oasis_onboarding_complete') === 'true') return;
        var old = oldTourNode();
        if (!old) return;
        old.style.display = 'none';
        active = true;
        render();
        tour.classList.add('is-visible');
      }

      var observer = new MutationObserver(activateIfNeeded);
      observer.observe(document.documentElement, { childList: true, subtree: true });
      document.addEventListener('DOMContentLoaded', activateIfNeeded);
      setTimeout(activateIfNeeded, 1200);
    })();
  </script>
</body>

</html>
