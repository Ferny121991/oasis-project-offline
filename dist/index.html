length?tracks.map(function(t,i){return'<button class="oasis-audio-dock-track '+(t.active?'active':'')+'" data-row="'+i+'"><span class="oasis-audio-dock-index">'+(i+1)+'</span><span>'+t.title+'</span></button>'}).join(''):'<div class="oasis-audio-dock-empty">Agrega canciones con + Fondo para controlar la musica aqui.</div>';Array.from(q.querySelectorAll('[data-row]')).forEach(function(btn){btn.onclick=function(){var t=tracks[Number(btn.dataset.row)];if(t&&t.row)t.row.click()}})}function enhanceResponsiveAndAudio(){document.documentElement.classList.add('oasis-ui-v2-ready');if(window.innerWidth>=1900&&window.innerWidth<2100)document.documentElement.classList.add('xl-soft-compact');else document.documentElement.classList.remove('xl-soft-compact');var title=Array.from(document.querySelectorAll('span,div')).find(function(n){return /Playlist de Fondo/i.test(n.textContent||'')&&n.getClientRects().length});if(title){var card=title.closest('div[class*="overflow-hidden"]')||title.closest('div');if(card)card.classList.add('oasis-audio-enhanced')}var yt=document.getElementById('youtube-browser-iframe');if(yt&&yt.parentElement)yt.parentElement.classList.add('oasis-youtube-frame');var action=Array.from(document.querySelectorAll('button,span')).find(function(n){return /Crear nuevo item|Unir con actual/i.test(n.textContent||'')&&n.getClientRects().length});if(action){var row=action.closest('div[class*="border"]');if(row)row.classList.add('oasis-youtube-actions')}var input=Array.from(document.querySelectorAll('input[placeholder*="Pega link"],input[placeholder*="busca"]')).find(function(n){return n.getClientRects().length});if(input)input.classList.add('oasis-youtube-input');var submit=Array.from(document.querySelectorAll('button')).find(function(n){return /BUSCAR|AGREGAR A LISTA|BUSCANDO/i.test(n.textContent||'')&&n.getClientRects().length});if(submit)submit.classList.add('oasis-youtube-submit')}setInterval(function(){ensureButton();improveLogoPreviewSize();importCloudOnce();applySavedLogoToVisibleLogo();enhanceResponsiveAndAudio();ensureAudioDock()},500)})();</script>
